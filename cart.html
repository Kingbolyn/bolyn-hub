<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Bolyn's Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #0f172a;
            --bg-elevated: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --success: #22c55e;
            --error: #ef4444;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-elevated: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .cart-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

            .cart-header h1 {
                font-family: 'Playfair Display', serif;
                font-size: 2.5rem;
            }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

            .back-link:hover {
                color: var(--primary);
            }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
        }

            .cart-empty i {
                font-size: 4rem;
                color: var(--text-muted);
                margin-bottom: 1.5rem;
            }

            .cart-empty h2 {
                font-family: 'Playfair Display', serif;
                margin-bottom: 1rem;
            }

            .cart-empty p {
                color: var(--text-muted);
                margin-bottom: 2rem;
            }

        .btn {
            padding: 12px 32px;
            background: var(--primary);
            color: var(--bg);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3);
            }

        .cart-items {
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 1rem;
            align-items: center;
        }

            .cart-item img {
                width: 100px;
                height: 100px;
                border-radius: 12px;
                object-fit: cover;
            }

        .cart-item-details {
            flex: 1;
        }

            .cart-item-details h3 {
                font-weight: 600;
                margin-bottom: 0.3rem;
            }

            .cart-item-details .brand {
                color: var(--text-muted);
                font-size: 0.85rem;
                margin-bottom: 0.5rem;
            }

        .cart-item-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 700;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

            .cart-item-qty button {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--bg);
                color: var(--text);
                cursor: pointer;
                transition: all 0.3s;
            }

                .cart-item-qty button:hover {
                    background: var(--primary);
                    color: var(--bg);
                }

            .cart-item-qty span {
                width: 40px;
                text-align: center;
                font-weight: 600;
            }

        .cart-item-remove {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            transition: all 0.3s;
        }

            .cart-item-remove:hover {
                transform: scale(1.2);
            }

        .cart-summary {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

            .cart-summary h3 {
                font-family: 'Playfair Display', serif;
                margin-bottom: 1.5rem;
            }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

            .summary-row.total {
                font-size: 1.3rem;
                font-weight: 700;
                color: var(--text);
                border-top: 1px solid var(--border);
                padding-top: 1rem;
                margin-top: 1rem;
            }

                .summary-row.total span:last-child {
                    color: var(--primary);
                }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

            .checkout-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3);
            }
    </style>
</head>
<body>

    <div class="cart-container">
        <div class="cart-header">
            <h1>Your Cart</h1>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Continue Shopping
            </a>
        </div>

        <div id="cartContent">
            <!-- Content loaded via JS -->
        </div>
    </div>

    <script>function renderCart() {
            const cart = JSON.parse(localStorage.getItem('bolynCart') || '[]');
            const container = document.getElementById('cartContent');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-basket"></i>
                        <h2>Your cart is empty</h2>
                        <p>Add some items from our brands to get started</p>
                        <a href="index.html" class="btn">
                            <i class="fas fa-store"></i>
                            Browse Brands
                        </a>
                    </div>
                `;
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            container.innerHTML = `
                <div class="cart-items">
                    ${cart.map((item, i) => `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-details">
                                <h3>${item.name}</h3>
                                <div class="brand">${item.brand === 'fresh' ? 'Fresh Bite' : item.brand === 'ttscents' ? 'TT Scents' : 'Bolyn\'s Hub'}</div>
                                <div class="cart-item-price">₦${(item.price * item.qty).toLocaleString()}</div>
                            </div>
                            <div class="cart-item-qty">
                                <button onclick="updateQty(${i}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="updateQty(${i}, 1)">+</button>
                            </div>
                            <button class="cart-item-remove" onclick="removeItem(${i})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `).join('')}
                </div>

                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₦${total.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>₦${total.toLocaleString()}</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">
                        <i class="fas fa-credit-card"></i>
                        Proceed to Checkout
                    </button>
                </div>
            `;
        }

        function updateQty(index, change) {
            const cart = JSON.parse(localStorage.getItem('bolynCart') || '[]');
            cart[index].qty += change;
            if (cart[index].qty < 1) cart[index].qty = 1;
            localStorage.setItem('bolynCart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('bolynCart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('bolynCart', JSON.stringify(cart));
            renderCart();
        }

        function checkout() {
            alert('In a production environment, this would redirect to Paystack/Flutterwave payment.');
        }

        renderCart();</script>
</body>
</html>
